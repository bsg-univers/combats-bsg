name: Sheets to JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/717034193677/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-sheet-exporter@github-sheet-exporter.iam.gserviceaccount.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install google-spreadsheet google-auth-library

      - name: Export sheets
        env:
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
        run: node scripts/export.js

      - name: Commit and Push JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/*.json
          git commit -m "Update data from Google Sheets" || exit 0
          git push
